<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 포토 빙고</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111827;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

.room-tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.room-btn{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  background:#374151;
  color:white;
}

.room-btn.active{
  background:#f97316;
}

.add-room{
  background:#10b981;
}

.controls{
  margin-bottom:20px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  margin:4px;
}

.danger{
  background:#ef4444;
  color:white;
}

.board{
  width:min(90vw,500px);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.cell{
  aspect-ratio:1;
  background:#1f2937;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.placeholder{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9ca3af;
  font-size:14px;
}

.cell.checked{
  border:4px solid #facc15;
}

.cell.checked::after{
  content:"✓";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:white;
  background:rgba(0,0,0,0.4);
}

input[type=file]{
  display:none;
}
</style>
</head>

<body>

<h1>📸 포토 빙고</h1>

<div class="room-tabs" id="roomTabs"></div>

<div class="controls">
  <button class="danger" id="resetBtn">🗑 초기화</button>
</div>

<div class="board" id="board"></div>

<input type="file" id="fileInput" accept="image/*">

<script>
const board = document.getElementById("board");
const fileInput = document.getElementById("fileInput");
const roomTabs = document.getElementById("roomTabs");

let selectedCell = null;

let rooms = [];
let currentRoom = 0;

// 저장
function saveData(){
  localStorage.setItem("photoBingoRooms", JSON.stringify(rooms));
}

// 불러오기
function loadData(){

  const saved = localStorage.getItem("photoBingoRooms");

  if(saved){

    rooms = JSON.parse(saved);

  }else{

    rooms = [
      createRoom("1반"),
      createRoom("2반")
    ];

  }

}

// 방 생성
function createRoom(name){

  return {
    name:name,
    cells:Array.from({length:25}, ()=>({
      image:null,
      checked:false
    }))
  };

}

// 현재 방
function room(){
  return rooms[currentRoom];
}

// 방 탭 렌더링
function renderTabs(){

  roomTabs.innerHTML = "";

  rooms.forEach((r,index)=>{

    const btn = document.createElement("button");

    btn.className = "room-btn";

    if(index === currentRoom){
      btn.classList.add("active");
    }

    btn.innerText = r.name;

    btn.onclick = ()=>{
      currentRoom = index;
      renderTabs();
      renderBoard();
    };

    roomTabs.appendChild(btn);

  });

  // 추가 버튼
  const addBtn = document.createElement("button");

  addBtn.className = "room-btn add-room";
  addBtn.innerText = "+ 방 추가";

  addBtn.onclick = ()=>{

    const name = prompt("방 이름 입력");

    if(!name) return;

    rooms.push(createRoom(name));

    saveData();

    renderTabs();

  };

  roomTabs.appendChild(addBtn);

}

// 보드 렌더링
function renderBoard(){

  board.innerHTML = "";

  room().cells.forEach((cell,index)=>{

    const div = document.createElement("div");

    div.className = "cell";

    if(cell.checked){
      div.classList.add("checked");
    }

    if(cell.image){

      const img = document.createElement("img");

      img.src = cell.image;

      div.appendChild(img);

    }else{

      const placeholder = document.createElement("div");

      placeholder.className = "placeholder";
      placeholder.innerText = "사진 추가";

      div.appendChild(placeholder);

    }

    // 클릭
    div.onclick = ()=>{

      // 빈칸이면 사진 추가
      if(!cell.image){

        selectedCell = index;

        fileInput.click();

      }else{

        // 사진 있으면 체크
        cell.checked = !cell.checked;

        saveData();

        renderBoard();

        checkBingo();

      }

    };

    // 우클릭 삭제
    div.oncontextmenu = (e)=>{

      e.preventDefault();

      if(cell.image){

        const ok = confirm("사진 삭제할까요?");

        if(ok){

          cell.image = null;
          cell.checked = false;

          saveData();

          renderBoard();

        }

      }

    };

    board.appendChild(div);

  });

}

// 파일 업로드
fileInput.addEventListener("change",(e)=>{

  const file = e.target.files[0];

  if(!file || selectedCell === null) return;

  const reader = new FileReader();

  reader.onload = (ev)=>{

    room().cells[selectedCell].image = ev.target.result;

    saveData();

    renderBoard();

    selectedCell = null;

  };

  reader.readAsDataURL(file);

  fileInput.value = "";

});

// 초기화
document.getElementById("resetBtn").onclick = ()=>{

  const ok = confirm("초기화할까요?");

  if(!ok) return;

  room().cells = Array.from({length:25}, ()=>({
    image:null,
    checked:false
  }));

  saveData();

  renderBoard();

};

// 빙고 체크
function checkBingo(){

  const lines = [];

  for(let r=0;r<5;r++){
    lines.push([r*5,r*5+1,r*5+2,r*5+3,r*5+4]);
  }

  for(let c=0;c<5;c++){
    lines.push([c,c+5,c+10,c+15,c+20]);
  }

  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);

  let bingo = 0;

  lines.forEach(line=>{

    const ok = line.every(i=>room().cells[i].checked);

    if(ok){
      bingo++;
    }

  });

  if(bingo > 0){

    setTimeout(()=>{
      alert("🎉 " + bingo + "빙고!");
    },100);

  }

}

// 시작
loadData();
renderTabs();
renderBoard();
</script>

</body>
</html>
