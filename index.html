<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>추억 수집 BANGO!</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
  margin:0;
  padding:20px;
  background:#0a0a12;
  color:white;
  font-family:sans-serif;
}

h1{
  color:#ff6b35;
}

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

button{
  border:none;
  background:#ff6b35;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  cursor:pointer;
  font-size:15px;
}

.room-tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.room-btn{
  background:#1a1a2e;
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
}

.room-btn.active{
  background:#ff6b35;
}

.board{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  max-width:650px;
}

.cell{
  aspect-ratio:1;
  background:#1a1a2e;
  border-radius:12px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.08);
  cursor:pointer;
  position:relative;
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.label{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,.6);
  padding:6px;
  font-size:12px;
  text-align:center;
  box-sizing:border-box;
}

.empty{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  text-align:center;
  padding:10px;
  font-size:13px;
}

.preview-wrap{
  margin-top:30px;
}

.preview-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}

.preview-card{
  background:#1a1a2e;
  border-radius:10px;
  overflow:hidden;
}

.preview-card img{
  width:100%;
  height:120px;
  object-fit:cover;
  display:block;
}

.preview-card div{
  padding:6px;
  font-size:12px;
  text-align:center;
}

.score{
  margin-bottom:20px;
  font-size:22px;
}

</style>
</head>
<body>

<h1>🎯 추억 수집 BANGO!</h1>

<div class="score">
총 점수 :
<span id="score">0</span>
</div>

<div class="top">
  <button id="addRoomBtn">채널 추가하기</button>
</div>

<div class="room-tabs" id="roomTabs"></div>

<div class="board" id="board"></div>

<div class="preview-wrap">
  <h2>📸 저장된 사진</h2>
  <div class="preview-grid" id="previewGrid"></div>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>

// ==========================
// SUPABASE
// ==========================

const SUPABASE_URL =
'https://YOUR_PROJECT.supabase.co';

const SUPABASE_KEY =
'YOUR_SUPABASE_ANON_KEY';

const supabaseClient =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

// ==========================
// LABELS
// ==========================

const LABELS = [
"거울샷","담임선생님과 함께","우리들의 야식샷","파워레인저샷","그림자샷",
"별 손가락 샷","스누피와 함께","축소샷","남학생 공항룩","비행기샷",
"헬멧착용샷","여학생 공항룩","단체샷","2만보 인증샷","리더의 무게샷",
"입 들어가샷","해양생물과 함께","별모양포즈","기념품 플렉스샷","오설록 포즈",
"바퀴벌레샷","남녀학생 함께","끌려다니기 샷","하트샷","돌하르방샷"
];

// ==========================
// STATE
// ==========================

function createRoom(name,password){

  return {
    id:Math.random().toString(36).substring(2,8),
    name,
    password,
    bingo:0,
    cells:Array.from(
      {length:25},
      (_,i)=>({
        label:LABELS[i],
        image:null
      })
    )
  };
}

let rooms = [];
let currentRoomIndex = 0;
let pendingCell = null;

// ==========================
// DOM
// ==========================

const board =
document.getElementById('board');

const fileInput =
document.getElementById('fileInput');

// ==========================
// SCORE
// ==========================

function calculateScore(room){

  let filled =
  room.cells.filter(c=>c.image).length;

  return filled * 2 + room.bingo * 5;
}

// ==========================
// SAVE
// ==========================

async function saveRooms(){

  localStorage.setItem(
    'bango_rooms',
    JSON.stringify(rooms)
  );

  await supabaseClient
    .from('bango_rooms')
    .upsert({
      id:'global',
      data:rooms
    });
}

// ==========================
// LOAD
// ==========================

async function loadRooms(){

  const local =
  localStorage.getItem('bango_rooms');

  if(local){

    rooms = JSON.parse(local);

  }else{

    rooms = [
      createRoom('1반','1234')
    ];
  }

  const { data } =
  await supabaseClient
    .from('bango_rooms')
    .select('*')
    .eq('id','global')
    .single();

  if(data?.data){

    rooms = data.data;
  }
}

// ==========================
// IMAGE
// ==========================

async function uploadImage(file){

  const filename =
  Date.now() + '_' + file.name;

  const path =
  'uploads/' + filename;

  await supabaseClient
    .storage
    .from('bango-images')
    .upload(path,file);

  const { data } =
  supabaseClient
    .storage
    .from('bango-images')
    .getPublicUrl(path);

  return data.publicUrl;
}

// ==========================
// BINGO
// ==========================

function getLines(){

  const lines = [];

  for(let r=0;r<5;r++){

    lines.push([
      r*5,
      r*5+1,
      r*5+2,
      r*5+3,
      r*5+4
    ]);
  }

  for(let c=0;c<5;c++){

    lines.push([
      c,
      c+5,
      c+10,
      c+15,
      c+20
    ]);
  }

  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);

  return lines;
}

function checkBingo(){

  let count = 0;

  getLines().forEach(line=>{

    if(
      line.every(
        i=>rooms[currentRoomIndex]
        .cells[i]
        .image
      )
    ){
      count++;
    }
  });

  rooms[currentRoomIndex].bingo =
  count;
}

// ==========================
// BOARD
// ==========================

function renderBoard(){

  board.innerHTML = '';

  const room =
  rooms[currentRoomIndex];

  room.cells.forEach((cell,i)=>{

    const div =
    document.createElement('div');

    div.className = 'cell';

    if(cell.image){

      div.innerHTML = `
        <img src="${cell.image}">
        <div class="label">
          ${cell.label}
        </div>
      `;

    }else{

      div.innerHTML = `
        <div class="empty">
          ${cell.label}
        </div>
      `;
    }

    div.onclick = ()=>{

      pendingCell = i;

      fileInput.click();
    };

    board.appendChild(div);
  });

  document.getElementById('score')
  .textContent =
  calculateScore(room);

  renderPreview();
}

// ==========================
// PREVIEW
// ==========================

function renderPreview(){

  const grid =
  document.getElementById(
    'previewGrid'
  );

  grid.innerHTML = '';

  rooms[currentRoomIndex]
  .cells
  .forEach(cell=>{

    if(!cell.image) return;

    const card =
    document.createElement('div');

    card.className =
    'preview-card';

    card.innerHTML = `
      <img src="${cell.image}">
      <div>${cell.label}</div>
    `;

    grid.appendChild(card);
  });
}

// ==========================
// ROOMS
// ==========================

function renderRooms(){

  const tabs =
  document.getElementById(
    'roomTabs'
  );

  tabs.innerHTML = '';

  rooms.forEach((room,i)=>{

    const btn =
    document.createElement('div');

    btn.className =
      'room-btn' +
      (
        i===currentRoomIndex
        ? ' active'
        : ''
      );

    btn.textContent =
    room.name;

    btn.onclick = ()=>{

      const input =
      prompt('비밀번호 입력');

      if(
        input !== room.password
      ){
        alert('비밀번호 틀림');
        return;
      }

      currentRoomIndex = i;

      renderRooms();
      renderBoard();
    };

    tabs.appendChild(btn);
  });
}

// ==========================
// FILE
// ==========================

fileInput.addEventListener(
  'change',
  async e=>{

    const file =
    e.target.files[0];

    if(!file) return;

    const imageUrl =
    await uploadImage(file);

    rooms[currentRoomIndex]
    .cells[pendingCell]
    .image = imageUrl;

    checkBingo();

    renderBoard();

    saveRooms();
  }
);

// ==========================
// ROOM CREATE
// ==========================

document
.getElementById(
  'addRoomBtn'
)
.onclick = ()=>{

  const name =
  prompt('방 이름');

  if(!name) return;

  const password =
  prompt('방 비밀번호');

  if(!password) return;

  rooms.push(
    createRoom(
      name,
      password
    )
  );

  renderRooms();

  saveRooms();
};

// ==========================
// INIT
// ==========================

async function init(){

  await loadRooms();

  renderRooms();

  renderBoard();
}

init();

</script>

</body>
</html>
