<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 포토 빙고</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#111827;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

.board{
  width:min(90vw,500px);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.cell{
  aspect-ratio:1;
  background:#1f2937;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  border:2px solid transparent;
}

.cell img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.placeholder{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#9ca3af;
  font-size:14px;
}

.cell.checked{
  border:4px solid #facc15;
}

.cell.checked::after{
  content:"✓";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  color:white;
  background:rgba(0,0,0,0.4);
}

.controls{
  margin-bottom:20px;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  margin:4px;
}

.primary{
  background:#f97316;
  color:white;
}

.danger{
  background:#ef4444;
  color:white;
}

.mode{
  margin-bottom:15px;
  color:#facc15;
}

input[type=file]{
  display:none;
}
</style>
</head>

<body>

<h1>📸 포토 빙고</h1>

<div class="controls">
  <button class="primary" id="modeBtn">🎮 게임 시작</button>
  <button class="danger" id="resetBtn">🗑 초기화</button>
</div>

<div class="mode" id="modeText">
사진 추가 모드
</div>

<div class="board" id="board"></div>

<input type="file" id="fileInput" accept="image/*">

<script>
const board = document.getElementById("board");
const fileInput = document.getElementById("fileInput");
const modeBtn = document.getElementById("modeBtn");
const modeText = document.getElementById("modeText");

let mode = "edit";
let selectedCell = null;

let cells = [];

// 저장
function saveData(){
  localStorage.setItem("photoBingoData", JSON.stringify(cells));
}

// 불러오기
function loadData(){
  const saved = localStorage.getItem("photoBingoData");

  if(saved){
    cells = JSON.parse(saved);
  }else{
    cells = Array.from({length:25}, ()=>({
      image:null,
      checked:false
    }));
  }
}

// 보드 렌더링
function renderBoard(){
  board.innerHTML = "";

  cells.forEach((cell,index)=>{

    const div = document.createElement("div");
    div.className = "cell";

    if(cell.checked){
      div.classList.add("checked");
    }

    // 이미지 있음
    if(cell.image){

      const img = document.createElement("img");
      img.src = cell.image;
      div.appendChild(img);

    }else{

      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.innerText = "사진 추가";
      div.appendChild(placeholder);
    }

    // 클릭
    div.addEventListener("click",()=>{

      // 편집모드
      if(mode === "edit"){

        if(!cell.image){
          selectedCell = index;
          fileInput.click();
        }

      }else{

        // 게임모드
        if(cell.image){
          cell.checked = !cell.checked;
          saveData();
          renderBoard();
          checkBingo();
        }

      }

    });

    // 우클릭 삭제
    div.addEventListener("contextmenu",(e)=>{
      e.preventDefault();

      if(mode === "edit" && cell.image){

        const ok = confirm("사진 삭제할까요?");

        if(ok){
          cell.image = null;
          cell.checked = false;

          saveData();
          renderBoard();
        }

      }

    });

    board.appendChild(div);

  });

}

// 파일 업로드
fileInput.addEventListener("change",(e)=>{

  const file = e.target.files[0];

  if(!file || selectedCell === null) return;

  const reader = new FileReader();

  reader.onload = (ev)=>{

    cells[selectedCell].image = ev.target.result;

    saveData();
    renderBoard();

    selectedCell = null;

  };

  reader.readAsDataURL(file);

  fileInput.value = "";

});

// 모드 변경
modeBtn.addEventListener("click",()=>{

  if(mode === "edit"){

    mode = "play";

    cells.forEach(c=>{
      c.checked = false;
    });

    modeBtn.innerText = "✏️ 편집 모드";
    modeText.innerText = "게임 플레이 모드";

  }else{

    mode = "edit";

    modeBtn.innerText = "🎮 게임 시작";
    modeText.innerText = "사진 추가 모드";

  }

  saveData();
  renderBoard();

});

// 초기화
document.getElementById("resetBtn").addEventListener("click",()=>{

  const ok = confirm("전체 초기화할까요?");

  if(!ok) return;

  localStorage.removeItem("photoBingoData");

  cells = Array.from({length:25}, ()=>({
    image:null,
    checked:false
  }));

  renderBoard();

});

// 빙고 체크
function checkBingo(){

  const lines = [];

  // 가로
  for(let r=0;r<5;r++){
    lines.push([r*5,r*5+1,r*5+2,r*5+3,r*5+4]);
  }

  // 세로
  for(let c=0;c<5;c++){
    lines.push([c,c+5,c+10,c+15,c+20]);
  }

  // 대각선
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);

  let bingo = 0;

  lines.forEach(line=>{

    const ok = line.every(i=>cells[i].checked);

    if(ok){
      bingo++;
    }

  });

  if(bingo > 0){
    alert(`🎉 ${bingo}빙고 완성!`);
  }

}

// 시작
loadData();
renderBoard();
</script>

</body>
</html>
